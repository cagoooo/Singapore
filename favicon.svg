<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background: Singapore red, rounded square (app-icon shape) -->
  <rect width="100" height="100" rx="20" fill="#c8102e"/>

  <!-- MBS Tower 1 (left) — tapered rectangle -->
  <polygon points="22,88 32,88 35,50 19,50" fill="white"/>
  <!-- MBS Tower 2 (center, tallest) -->
  <polygon points="40,88 51,88 54,41 37,41" fill="white"/>
  <!-- MBS Tower 3 (right) -->
  <polygon points="59,88 69,88 72,50 56,50" fill="white"/>

  <!-- Sky Park — the iconic horizontal "boat" on top -->
  <rect x="15" y="45" width="62" height="9" rx="4.5" fill="white"/>
  <!-- Infinity pool on sky park (light blue highlight) -->
  <rect x="17" y="45" width="58" height="5" rx="2.5" fill="#7dd3fc" opacity="0.75"/>

  <!-- Stars (Singapore flag crescent & stars motif, top area) -->
  <!-- Crescent moon (white circle with red cut-out) -->
  <circle cx="26" cy="22" r="8" fill="white"/>
  <circle cx="30" cy="19" r="6.5" fill="#c8102e"/>
  <!-- 5 small stars in arc -->
  <polygon points="40,15 41.2,18.7 45,18.7 42,21 43.2,24.7 40,22.4 36.8,24.7 38,21 35,18.7 38.8,18.7" fill="white" transform="scale(0.55) translate(27,12)"/>
  <polygon points="40,15 41.2,18.7 45,18.7 42,21 43.2,24.7 40,22.4 36.8,24.7 38,21 35,18.7 38.8,18.7" fill="white" transform="scale(0.55) translate(42,3)"/>
  <polygon points="40,15 41.2,18.7 45,18.7 42,21 43.2,24.7 40,22.4 36.8,24.7 38,21 35,18.7 38.8,18.7" fill="white" transform="scale(0.55) translate(57,3)"/>
  <polygon points="40,15 41.2,18.7 45,18.7 42,21 43.2,24.7 40,22.4 36.8,24.7 38,21 35,18.7 38.8,18.7" fill="white" transform="scale(0.55) translate(72,12)"/>
  <polygon points="40,15 41.2,18.7 45,18.7 42,21 43.2,24.7 40,22.4 36.8,24.7 38,21 35,18.7 38.8,18.7" fill="white" transform="scale(0.55) translate(57,22)"/>
</svg>
